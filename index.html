<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>spondanai.dev — portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #1e1e1e;
    --bg-deep: #181818;
    --bg-sidebar: #252526;
    --bg-activitybar: #181818;
    --bg-titlebar: #1f1f1f;
    --bg-statusbar: #007acc;
    --bg-tab-active: #1e1e1e;
    --bg-tab-inactive: #2d2d2d;
    --bg-tab-hover: #1a1a1a;
    --bg-terminal: #181818;
    --bg-panel-header: #181818;
    --bg-hover: #2a2d2e;
    --bg-selected: #094771;
    --bg-overlay: rgba(0, 0, 0, 0.55);

    --border: #2b2b2b;
    --border-strong: #3c3c3c;
    --focus-ring: #007fd4;

    --fg: #cccccc;
    --fg-dim: #858585;
    --fg-faint: #6e6e6e;
    --fg-bright: #ffffff;

    --accent: #007acc;
    --accent-2: #4ec9b0;

    --syntax-keyword: #c586c0;
    --syntax-string: #ce9178;
    --syntax-function: #dcdcaa;
    --syntax-variable: #9cdcfe;
    --syntax-type: #4ec9b0;
    --syntax-number: #b5cea8;
    --syntax-comment: #6a9955;
    --syntax-operator: #d4d4d4;
    --syntax-property: #9cdcfe;
    --syntax-tag: #569cd6;
    --syntax-punct: #808080;

    --term-green: #23d18b;
    --term-yellow: #f5f543;
    --term-red: #f14c4c;
    --term-cyan: #29b8db;
    --term-magenta: #d670d6;
    --term-blue: #3b8eea;

    --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
    --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

    --line-h: 22px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  ::selection { background: #264f78; color: #fff; }

  /* Scrollbars — VS Code styled */
  ::-webkit-scrollbar { width: 14px; height: 14px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(121, 121, 121, 0.4);
    border: 3px solid transparent;
    background-clip: padding-box;
    border-radius: 7px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(160, 160, 160, 0.7); background-clip: padding-box; border: 3px solid transparent; }

  /* App shell ------------------------------------------------------- */
  .ide {
    display: grid;
    grid-template-rows: 30px 1fr 22px;
    height: 100vh;
    width: 100vw;
    background: var(--bg);
    color: var(--fg);
  }

  /* Title bar */
  .titlebar {
    display: flex;
    align-items: center;
    background: var(--bg-titlebar);
    border-bottom: 1px solid #000;
    padding: 0 8px;
    user-select: none;
    font-family: var(--font-ui);
    font-size: 12px;
    gap: 8px;
  }
  .traffic { display: flex; gap: 8px; padding: 0 4px; }
  .traffic span {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block;
  }
  .traffic .r { background: #ff5f56; }
  .traffic .y { background: #ffbd2e; }
  .traffic .g { background: #27c93f; }
  .titlebar .menu { display: flex; gap: 2px; padding-left: 12px; color: var(--fg); }
  .titlebar .menu span {
    padding: 2px 8px; border-radius: 4px; cursor: default;
  }
  .titlebar .menu span:hover { background: rgba(255,255,255,0.08); }
  .titlebar .title {
    flex: 1; text-align: center; color: var(--fg-dim);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .titlebar .win-actions { display: flex; gap: 4px; color: var(--fg-dim); }
  .titlebar .win-actions span {
    width: 26px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 3px; cursor: default;
  }
  .titlebar .win-actions span:hover { background: rgba(255,255,255,0.06); }

  /* Main body grid */
  .body {
    display: grid;
    grid-template-columns: 48px var(--side-w, 260px) 1fr;
    min-height: 0;
    overflow: hidden;
  }
  .body.no-sidebar { grid-template-columns: 48px 0 1fr; }
  .body.no-sidebar .sidebar { display: none; }

  /* Activity bar */
  .activitybar {
    background: var(--bg-activitybar);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 6px;
    gap: 4px;
    border-right: 1px solid var(--border);
  }
  .activitybar button {
    width: 40px; height: 40px;
    background: transparent; border: 0; color: var(--fg-faint);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    border-left: 2px solid transparent;
  }
  .activitybar button:hover { color: var(--fg-bright); }
  .activitybar button.active { color: var(--fg-bright); border-left-color: var(--fg-bright); }
  .activitybar .spacer { flex: 1; }
  .activitybar .badge {
    position: absolute; top: 8px; right: 6px;
    background: var(--accent); color: #fff; font-family: var(--font-ui);
    font-size: 9px; line-height: 1; padding: 2px 4px; border-radius: 6px; font-weight: 600;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-width: 0; overflow: hidden;
  }
  .side-header {
    padding: 8px 18px 6px;
    font-family: var(--font-ui);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-dim);
    display: flex; align-items: center; justify-content: space-between;
  }
  .side-header .actions { display: flex; gap: 8px; opacity: 0.7; }
  .side-section {
    border-top: 1px solid transparent;
  }
  .side-section + .side-section { margin-top: 4px; }
  .side-section-title {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px 4px 8px;
    font-family: var(--font-ui);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--fg);
    cursor: pointer;
    user-select: none;
  }
  .side-section-title .chev { width: 12px; display: inline-block; transition: transform .15s; }
  .side-section.collapsed .chev { transform: rotate(-90deg); }
  .side-section.collapsed .side-section-body { display: none; }
  .tree { font-family: var(--font-mono); font-size: 13px; }
  .tree .row {
    display: flex; align-items: center; gap: 6px;
    padding: 1px 8px 1px 22px;
    cursor: pointer; color: var(--fg);
    user-select: none;
    white-space: nowrap;
    line-height: 22px;
  }
  .tree .row.folder { padding-left: 8px; }
  .tree .row .chev { width: 12px; display: inline-block; color: var(--fg-dim); }
  .tree .row.folder.open .chev { transform: rotate(90deg); }
  .tree .row .ic { width: 16px; display: inline-block; flex-shrink: 0; }
  .tree .row:hover { background: var(--bg-hover); }
  .tree .row.active { background: var(--bg-selected); color: var(--fg-bright); }
  .tree .row.active::before {
    content: ""; position: absolute; left: 0; width: 2px; height: 22px; background: var(--accent);
  }
  .tree .row { position: relative; }
  .tree .children { padding-left: 16px; }
  .tree .children .row { padding-left: 28px; }
  .tree .badge {
    margin-left: auto; padding: 0 5px; border-radius: 9px;
    font-family: var(--font-ui); font-size: 10px; font-weight: 600;
    background: rgba(255,255,255,0.08); color: var(--fg-dim);
  }
  .tree .row.modified .badge { color: #e2c08d; }

  /* Editor area */
  .editor-area {
    display: grid;
    grid-template-rows: 36px 24px minmax(0, 1fr) var(--term-h, 0px);
    min-width: 0;
    min-height: 0;
    background: var(--bg);
    overflow: hidden;
  }
  .editor-area.no-term { grid-template-rows: 36px 24px minmax(0, 1fr); }

  .tabs {
    background: var(--bg-deep);
    display: flex; align-items: stretch;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    overflow-y: hidden;
  }
  .tabs::-webkit-scrollbar { height: 3px; }
  .tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 12px;
    height: 36px;
    background: var(--bg-tab-inactive);
    border-right: 1px solid var(--border);
    color: var(--fg-dim);
    cursor: pointer; user-select: none;
    font-family: var(--font-mono); font-size: 13px;
    position: relative;
    min-width: 0;
  }
  .tab .close {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; color: transparent;
  }
  .tab:hover .close { color: var(--fg-dim); }
  .tab .close:hover { background: rgba(255,255,255,0.1); color: var(--fg-bright); }
  .tab.active {
    background: var(--bg-tab-active); color: var(--fg-bright);
  }
  .tab.active::after {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--accent);
  }
  .tab.dirty .close::before {
    content: "●"; color: var(--fg);
  }
  .tab.dirty:hover .close::before { content: ""; }
  .tab .ic { flex-shrink: 0; }

  .breadcrumbs {
    display: flex; align-items: center; gap: 4px;
    padding: 0 12px;
    height: 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    color: var(--fg-dim);
    font-family: var(--font-mono); font-size: 12px;
    overflow: hidden; white-space: nowrap;
  }
  .breadcrumbs .crumb { display: inline-flex; align-items: center; gap: 4px; cursor: default; }
  .breadcrumbs .sep { color: var(--fg-faint); }

  /* Editor body */
  .editor {
    overflow: auto;
    min-height: 0;
    min-width: 0;
    position: relative;
    background: var(--bg);
  }
  .editor-overlay-gutter {
    position: absolute;
    left: 0;
    top: 0;
    width: 52px;
    padding: 12px 10px 120px 12px;
    display: flex;
    flex-direction: column;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: var(--line-h);
    color: var(--fg-faint);
    text-align: right;
    user-select: none;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    background: var(--bg);
    z-index: 1;
  }
  .editor-overlay-gutter span { display: block; height: var(--line-h); }
  .editor-content { padding-left: 52px; min-width: 0; }
  @media (max-width: 760px) {
    .editor-overlay-gutter { width: 38px; padding: 12px 6px 120px 6px; font-size: 11px; }
    .editor-content { padding-left: 38px; }
  }
  .editor-inner {
    display: flex;
    min-height: 100%;
  }
  .gutter {
    color: var(--fg-faint);
    text-align: right;
    padding: 12px 12px 12px 16px;
    user-select: none;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    line-height: var(--line-h);
  }
  .gutter .ln { display: block; height: var(--line-h); }
  .gutter .ln.cur { color: var(--fg-bright); }
  .code {
    flex: 1;
    padding: 12px 24px 80px 0;
    line-height: var(--line-h);
    white-space: pre-wrap;
    word-break: break-word;
    min-width: 0;
  }

  /* Syntax helpers */
  .kw { color: var(--syntax-keyword); }
  .st { color: var(--syntax-string); }
  .fn { color: var(--syntax-function); }
  .vr { color: var(--syntax-variable); }
  .ty { color: var(--syntax-type); }
  .nm { color: var(--syntax-number); }
  .cm { color: var(--syntax-comment); font-style: italic; }
  .op { color: var(--syntax-operator); }
  .pr { color: var(--syntax-property); }
  .tg { color: var(--syntax-tag); }
  .pn { color: var(--syntax-punct); }
  .anno { color: var(--fg-dim); }

  /* Terminal panel */
  .panel {
    border-top: 1px solid var(--border);
    background: var(--bg-terminal);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .panel-tabs {
    display: flex; align-items: center;
    height: 30px;
    padding: 0 8px;
    background: var(--bg-panel-header);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-ui); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-dim);
    gap: 8px;
  }
  .panel-tab {
    padding: 6px 10px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    color: var(--fg-dim);
  }
  .panel-tab.active {
    color: var(--fg-bright);
    border-bottom-color: var(--fg-bright);
  }
  .panel-actions { margin-left: auto; display: flex; gap: 6px; color: var(--fg-dim); }
  .panel-actions span { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border-radius: 3px; cursor: pointer; }
  .panel-actions span:hover { background: rgba(255,255,255,0.08); color: var(--fg-bright); }
  .term-body {
    flex: 1; min-height: 0;
    padding: 8px 12px;
    overflow: auto;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    color: var(--fg);
  }
  .term-line { white-space: pre-wrap; word-break: break-word; }
  .term-prompt-user { color: var(--term-green); }
  .term-prompt-at { color: var(--fg); }
  .term-prompt-host { color: var(--term-blue); }
  .term-prompt-path { color: var(--term-yellow); }
  .term-prompt-sym { color: var(--term-magenta); }
  .term-ok { color: var(--term-green); }
  .term-warn { color: var(--term-yellow); }
  .term-err { color: var(--term-red); }
  .term-input {
    background: transparent; border: 0; outline: 0;
    color: var(--fg); font-family: inherit; font-size: inherit;
    padding: 0; min-width: 1px;
    /* Width follows typed content so the block cursor sits right after the text. */
    field-sizing: content;
    caret-color: transparent;
  }
  /* Fallback for browsers without field-sizing: keep input flexible but hide native caret. */
  @supports not (field-sizing: content) {
    .term-input { flex: 1; }
    .term-current .blink { display: none; }
  }
  .term-current { display: flex; align-items: center; gap: 0; flex: 1; }
  .blink {
    display: inline-block; width: 7px; height: 15px; background: var(--fg-bright);
    margin-left: 1px; animation: blink 1.05s steps(1) infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Status bar */
  .statusbar {
    background: var(--bg-statusbar);
    color: #fff;
    display: flex; align-items: center;
    height: 22px;
    padding: 0 8px;
    font-family: var(--font-ui); font-size: 12px;
    gap: 12px;
    user-select: none;
  }
  .statusbar .grow { flex: 1; }
  .statusbar .item {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 0 6px; height: 22px;
    cursor: default;
  }
  .statusbar .item:hover { background: rgba(255,255,255,0.15); }

  /* Generic icon stroke */
  .icon { stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* File icons (colored) */
  .fi { width: 16px; height: 16px; display: inline-block; }

  /* Hero section (README) */
  .readme {
    padding: 32px clamp(20px, 6vw, 80px) 120px;
    max-width: 1100px;
    margin: 0 auto;
    font-family: var(--font-ui);
    line-height: 1.65;
    color: var(--fg);
  }
  .readme .badges { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 28px; font-family: var(--font-mono); font-size: 12px; }
  .readme .badge-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    background: #2d2d2d; color: var(--fg);
    border: 1px solid var(--border-strong);
  }
  .readme .badge-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--term-green); box-shadow: 0 0 8px var(--term-green); }
  .readme .ascii {
    font-family: var(--font-mono);
    color: var(--accent-2);
    line-height: 1.05;
    font-size: 12px;
    white-space: pre;
    overflow-x: auto;
    margin-bottom: 18px;
  }
  .readme h1 {
    font-family: var(--font-mono); font-weight: 700;
    font-size: clamp(36px, 6vw, 60px);
    margin: 8px 0 4px;
    color: var(--fg-bright);
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .readme h1 .at { color: var(--syntax-string); }
  .readme h1 .cursor { display: inline-block; width: 0.55ch; height: 0.95em; background: var(--accent-2); vertical-align: -0.05em; margin-left: 0.1ch; animation: blink 1.05s steps(1) infinite; }
  .readme .role {
    font-family: var(--font-mono); color: var(--syntax-comment);
    font-size: 15px; margin-bottom: 12px;
  }
  .readme .role .key { color: var(--syntax-keyword); }
  .readme .role .val { color: var(--syntax-string); }
  .readme .tagline { font-size: 18px; color: var(--fg); max-width: 62ch; }
  .readme .tagline .hl { color: var(--accent-2); font-weight: 600; }
  .readme .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px; margin-top: 36px;
  }
  .readme .stat {
    border: 1px solid var(--border-strong);
    background: #232323;
    padding: 14px 16px;
    border-radius: 4px;
    font-family: var(--font-mono);
  }
  .readme .stat .label { color: var(--syntax-comment); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .readme .stat .val { color: var(--fg-bright); font-size: 22px; margin-top: 4px; font-weight: 600; }
  .readme .stat .sub { color: var(--fg-dim); font-size: 11px; margin-top: 2px; }

  .readme h2 {
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--syntax-comment);
    text-transform: lowercase;
    margin: 44px 0 12px;
    letter-spacing: 0.02em;
    font-weight: 400;
  }
  .readme h2::before { content: "## "; color: var(--syntax-keyword); }

  .readme p { margin: 0 0 12px; max-width: 70ch; }
  .readme ul { padding-left: 18px; margin: 0 0 12px; }
  .readme li { margin: 4px 0; }
  .readme-list { list-style: none; padding-left: 0; }
  .readme-list li::before { content: "→ "; color: var(--syntax-keyword); }
  .readme-list li { padding-left: 0; margin: 6px 0; max-width: 68ch; }
  .readme a, .link {
    color: var(--accent-2); text-decoration: none;
    border-bottom: 1px dashed transparent;
  }
  .readme a:hover, .link:hover { border-bottom-color: var(--accent-2); }
  .readme code, .ic-tag {
    font-family: var(--font-mono);
    background: #2d2d2d;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--syntax-string);
    border: 1px solid var(--border-strong);
  }

  /* Project cards inside projects.json view */
  .json-doc { padding: 16px 0 80px; }
  .json-key { color: var(--syntax-property); }
  .json-string { color: var(--syntax-string); }
  .json-number { color: var(--syntax-number); }
  .json-bool { color: var(--syntax-tag); }
  .json-line { display: flex; align-items: baseline; }
  .json-toggle {
    width: 14px; flex-shrink: 0;
    color: var(--fg-faint);
    cursor: pointer;
    text-align: center;
  }
  .indent { display: inline-block; width: 1ch; }
  .proj-card {
    margin: 12px 0;
    border: 1px solid var(--border-strong);
    background: #232323;
    border-radius: 4px;
    padding: 12px 16px;
    font-family: var(--font-mono);
  }
  .proj-head {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    cursor: pointer;
  }
  .proj-head .name { color: var(--syntax-function); font-weight: 600; font-size: 15px; }
  .proj-head .lang { color: var(--syntax-comment); font-size: 12px; }
  .proj-head .desc { color: var(--fg-dim); font-size: 12px; font-family: var(--font-ui); margin-left: auto; }
  .proj-body { margin-top: 10px; display: none; }
  .proj-card.open .proj-body { display: block; }
  .proj-card.open .proj-head .desc { display: none; }
  .proj-section { margin-top: 12px; }
  .proj-section h4 {
    margin: 0 0 6px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--syntax-comment);
    font-weight: 500;
  }
  .proj-card ul { padding-left: 18px; margin: 0; font-family: var(--font-ui); color: var(--fg); font-size: 13px; }
  .proj-card .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 3px;
    background: #2d2d2d; color: var(--syntax-type);
    font-family: var(--font-mono); font-size: 11px;
    border: 1px solid var(--border-strong);
  }
  .chip .swatch { width: 8px; height: 8px; border-radius: 2px; background: var(--accent-2); }

  /* Command palette */
  .palette-overlay {
    position: fixed; inset: 0; background: var(--bg-overlay);
    display: flex; justify-content: center; align-items: flex-start;
    padding-top: 80px;
    z-index: 100;
  }
  .palette {
    width: min(640px, 90vw);
    background: #252526;
    border: 1px solid #454545;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    overflow: hidden;
    font-family: var(--font-ui);
    font-size: 13px;
  }
  .palette input {
    width: 100%; padding: 8px 12px;
    background: #3c3c3c; border: 1px solid var(--focus-ring); color: var(--fg-bright);
    font-family: var(--font-ui); font-size: 13px; outline: none;
    border-radius: 0;
  }
  .palette .list { max-height: 320px; overflow: auto; }
  .palette .item {
    padding: 6px 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
  }
  .palette .item .kind { color: var(--fg-dim); font-size: 11px; margin-left: auto; }
  .palette .item.sel { background: var(--bg-selected); color: #fff; }
  .palette .item:hover { background: rgba(255,255,255,0.06); }

  /* Mobile responsive ---------------------------------------------- */
  @media (max-width: 760px) {
    .body { grid-template-columns: 40px 0 1fr; }
    .body.show-sidebar { grid-template-columns: 40px min(75vw, 280px) 1fr; }
    .body.show-sidebar .sidebar { display: flex; position: relative; }
    .body.show-sidebar::after {
      content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 5; grid-column: 3; pointer-events: none;
    }
    .activitybar { padding-top: 4px; }
    .activitybar button { width: 36px; height: 36px; }
    .titlebar .menu, .titlebar .traffic { display: none; }
    .titlebar .win-actions { display: none; }
    .titlebar .title { text-align: left; font-size: 11px; }
    .breadcrumbs { display: none; }
    .readme { padding: 20px 16px 80px; }
    .readme .ascii { font-size: 9px; }
    .readme h1 { font-size: 34px; }
    .gutter { padding: 12px 8px 12px 8px; font-size: 12px; }
    .code { padding: 12px 12px 80px 0; font-size: 12.5px; }
    .panel-tabs { padding: 0 6px; font-size: 10px; }
    .statusbar { font-size: 11px; padding: 0 6px; gap: 6px; }
    .statusbar .item { padding: 0 4px; }
    .statusbar .item.hide-sm { display: none; }
  }

  /* Inline link buttons */
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border: 1px solid var(--border-strong);
    background: #2d2d2d;
    color: var(--fg);
    font-family: var(--font-mono); font-size: 12.5px;
    border-radius: 3px;
    cursor: pointer;
    text-decoration: none;
    transition: background .12s, border-color .12s, color .12s;
  }
  .btn:hover { background: #383838; color: var(--fg-bright); border-color: #555; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #1f8fd9; }

  /* Animations on mount */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeUp .35s ease both; }
  .fade-in.d1 { animation-delay: .05s; }
  .fade-in.d2 { animation-delay: .10s; }
  .fade-in.d3 { animation-delay: .15s; }
  .fade-in.d4 { animation-delay: .20s; }
  .fade-in.d5 { animation-delay: .25s; }

  /* Skills layout */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin: 14px 0 40px;
    font-family: var(--font-mono);
  }
  .skill-cat {
    border: 1px solid var(--border-strong);
    background: #232323;
    padding: 12px 14px;
    border-radius: 4px;
  }
  .skill-cat h4 {
    margin: 0 0 8px; font-size: 12px;
    color: var(--syntax-keyword); font-weight: 600;
  }
  .skill-cat h4::before { content: "- "; color: var(--syntax-punct); }
  .skill-list { display: flex; flex-direction: column; gap: 6px; }
  .skill-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .skill-row .nm { color: var(--syntax-string); flex: 1; }
  .skill-row .bar {
    width: 80px; height: 4px; background: #2d2d2d; border-radius: 2px; overflow: hidden;
    flex-shrink: 0;
  }
  .skill-row .bar > i {
    display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 2px;
  }
  .skill-row .yrs { color: var(--syntax-number); font-size: 11px; width: 40px; text-align: right; }

  /* Contact (terminal-style content) */
  .contact-doc { padding: 16px 0 80px; }
  .ci-block {
    margin-bottom: 18px;
    border-left: 2px solid var(--border-strong);
    padding-left: 14px;
  }
  .ci-block .label { color: var(--syntax-comment); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .ci-block .val { color: var(--fg-bright); font-size: 18px; margin-top: 4px; font-family: var(--font-mono); }
  .ci-block .val a { color: var(--accent-2); text-decoration: none; }
  .ci-block .val a:hover { text-decoration: underline; }
</style>
